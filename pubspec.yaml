name: flutter_rust
description: "Example Project Showcasing Flutter and Rust Bridge."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  hooks: ^1.0.1 # Official toolchain
  code_assets: ^1.0.0  # Required for CodeAsset types

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  native_toolchain_rust: ^1.0.3 # Modern Rust-to-Dart helper

flutter:
  uses-material-design: true
